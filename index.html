<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>찍이네</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐮</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="phone">
    <!-- Conversation header -->
    <header class="chat-header">
      <button class="hdr-btn hdr-back" aria-label="Back">
        <svg viewBox="0 0 12 20" width="18" height="18"><path d="M10 1L2 10l8 9" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="hdr-contact">
        <div class="hdr-avatar"><img src="profile.jpg" alt="profile" class="hdr-avatar-img" /></div>
        <div class="hdr-name">--</div>
      </div>
      <button class="hdr-btn hdr-menu" aria-label="Menu">
        <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="5" r="1.8" fill="currentColor"/><circle cx="12" cy="12" r="1.8" fill="currentColor"/><circle cx="12" cy="19" r="1.8" fill="currentColor"/></svg>
      </button>
    </header>

    <!-- Messages -->
    <main class="messages" id="messages"></main>

    <!-- Composer -->
    <footer class="composer">
      <button class="composer-plus" id="photoBtn" aria-label="Add photo">
        <svg viewBox="0 0 24 24" width="28" height="28"><circle cx="12" cy="12" r="11" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 7v10M7 12h10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <input type="file" id="photoInput" accept="image/*" hidden />
      <div class="input-wrap">
        <input id="msgInput" class="msg-input" type="text" placeholder="싸우지마" autocomplete="off" />
        <button id="sendBtn" class="send-btn" aria-label="Send" hidden>
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 20V5m0 0l-6 6m6-6l6 6" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </footer>
  </div>

  <script type="module" src="app.js?v=3"></script>
</body>
</html>
