<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>찍이네</title>
  <meta property="og:title" content="찍이네" />
  <meta property="og:description" content="친하게 지내" />
  <meta property="og:image" content="https://cxwndxg.vercel.app/og-image.jpg" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="찍이네" />
  <meta name="twitter:description" content="친하게 지내" />
  <meta name="twitter:image" content="https://cxwndxg.vercel.app/og-image.jpg" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐮</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="phone">
    <!-- Conversation header -->
    <header class="chat-header">
      <button class="hdr-btn hdr-notice" aria-label="Notice">
        <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 16v-4M12 8h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="hdr-contact">
        <div class="hdr-avatar"><img src="/profile.jpg" alt="profile" class="hdr-avatar-img" /></div>
        <div class="hdr-name">--</div>
      </div>
      <button class="hdr-btn hdr-search" aria-label="Search">
        <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="hdr-btn hdr-menu" aria-label="Menu">
        <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="5" r="1.8" fill="currentColor"/><circle cx="12" cy="12" r="1.8" fill="currentColor"/><circle cx="12" cy="19" r="1.8" fill="currentColor"/></svg>
      </button>
    </header>

    <!-- Messages -->
    <main class="messages" id="messages">
      <!-- Skeleton loading placeholder (removed on first render) -->
      <div class="skeleton-loading">
        <div class="skeleton-row recv"><div class="skeleton-bubble short"></div></div>
        <div class="skeleton-row recv"><div class="skeleton-bubble long"></div></div>
        <div class="skeleton-row sent"><div class="skeleton-bubble medium"></div></div>
        <div class="skeleton-row recv"><div class="skeleton-bubble medium"></div></div>
        <div class="skeleton-row sent"><div class="skeleton-bubble short"></div></div>
        <div class="skeleton-row sent"><div class="skeleton-bubble long"></div></div>
        <div class="skeleton-row recv"><div class="skeleton-bubble short"></div></div>
        <div class="skeleton-row sent"><div class="skeleton-bubble medium"></div></div>
        <div class="skeleton-row recv"><div class="skeleton-bubble long"></div></div>
        <div class="skeleton-row sent"><div class="skeleton-bubble short"></div></div>
      </div>
    </main>

    <!-- Scroll to bottom -->
    <button class="scroll-bottom-btn" id="scrollBottomBtn" aria-label="Scroll to bottom">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </button>

    <!-- Composer -->
    <footer class="composer">
      <button class="composer-plus" id="photoBtn" aria-label="Add photo">
        <svg viewBox="0 0 24 24" width="28" height="28"><circle cx="12" cy="12" r="11" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 7v10M7 12h10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <input type="file" id="photoInput" accept="image/*" multiple hidden />
      <div class="input-wrap">
        <textarea id="msgInput" class="msg-input" rows="1" placeholder="친하게 지내" autocomplete="off"></textarea>
        <button id="sendBtn" class="send-btn" aria-label="Send" hidden>
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 20V5m0 0l-6 6m6-6l6 6" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </footer>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
